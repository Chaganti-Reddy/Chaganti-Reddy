name: Metrics

on:
  # Schedule daily updates
  schedule: [{cron: "0 0/24 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  # push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: left profile 
        uses: stalomeow/metrics@projects-v2
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics-left.svg

          # Options
          user: Chaganti-Reddy
          template: classic
          base: header, activity, community
          plugin_wakatime: yes
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 180
          config_timezone: Asia/Kolkata
          config_padding: 0, 8 + 11%
          config_order: base.header, base.activity+community, wakatime

      - name: right profile 
        uses: stalomeow/metrics@projects-v2
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics-right.svg

          # Options
          user: Chaganti-Reddy
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_achievements: yes
          plugin_achievements_threshold: X
          plugin_achievements_limit: 8
          plugin_achievements_display: detailed
          # plugin_stars: yes
          # plugin_stars_limit: 2
          config_padding: 0, 8 + 11%
          config_order: achievements #, stars
