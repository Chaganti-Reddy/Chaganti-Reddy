name: Metrics

on:
  # Schedule daily updates
  schedule: [{cron: "0 0/24 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  # push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: left profile 
        uses: stalomeow/metrics@projects-v2
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics-left.svg

          # Options
          user: Chaganti-Reddy
          template: classic
          base: header, activity, community, metadata
          config_timezone: Asia/Kolkata
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 15
          plugin_languages_sections: most-used
          plugin_languages_ignored: html, css, jupyter notebook
          plugin_languages_details: percentage, lines
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 120
          commits_authoring: Chaganti-Reddy, chagantivenkataramireddy4@gmail.com, Chaganti-Reddy@users.noreply.github.com
          config_padding: 0, 8 + 11%
          config_order: base.header, base.activity+community, languages, metadata

      - name: right profile 
        uses: stalomeow/metrics@projects-v2
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics-right.svg

          # Options
          user: Chaganti-Reddy
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          plugin_achievements: yes
          plugin_achievements_threshold: X
          plugin_achievements_limit: 10
          plugin_achievements_display: detailed
          # plugin_stars: yes
          # plugin_stars_limit: 2
          config_padding: 0, 8 + 11%
          config_order: achievements #, stars
