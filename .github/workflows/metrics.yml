name: Metrics

on:
  schedule: [{cron: "0 0/24 * * *"}]
  workflow_dispatch:
  # push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: left profile 
        uses: stalomeow/metrics@projects-v2
        with:
          token: ${{ secrets.METRICS_TOKEN }} 
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          filename: github-metrics-left.svg
          user: Chaganti-Reddy
          template: classic
          config_timezone: Asia/Kolkata
          
          base: header, activity, community, repositories, metadata
          repositories_affiliations: owner, collaborator, organization_member
          
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base

          plugin_followup: yes
          plugin_followup_sections: repositories
          repositories: 1000
          repositories_forks: yes
          
          config_padding: 0, 8 + 11%
          config_order: base.header, base.activity+community, base.repositories, lines, metadata

      - name: right profile 
        uses: stalomeow/metrics@projects-v2
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          filename: github-metrics-right.svg
          user: Chaganti-Reddy
          template: classic
          base: ""
          config_timezone: Asia/Kolkata
          
          # --- WakaTime ---
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 180
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs
          
          # --- Achievements ---
          plugin_achievements: yes
          plugin_achievements_threshold: X
          plugin_achievements_limit: 10
          plugin_achievements_display: detailed

          plugin_people: yes
          plugin_people_limit: 25
          plugin_people_size: 28
          plugin_people_types: followers, following
          
          config_padding: 0, 8 + 11%
          config_order: achievements, people, wakatime
